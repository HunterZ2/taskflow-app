            "const counts = new Map();
          module.exports = (max, windowMs) => (req, res, next) => {
            max = max || 100;
            windowMs = windowMs || 900000;
            const key = req.ip;
            const now = Date.now();
            const e = counts.get(key) || { count: 0, resetAt: now + windowMs };
            if (now > e.resetAt) { e.count = 0; e.resetAt = now + windowMs; }
            e.count++;
            counts.set(key, e);
            if (e.count > max) return res.status(429).json({ error: 'Too many requests' });
            next();
          };"

