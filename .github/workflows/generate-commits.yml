name: Generate 100 Commits

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate 100 commits (Jan–Apr 2026)
        run: |
          set -e

          make_commit() {
            DATE="$1"
            MSG="$2"
            FILE="$3"
            CONTENT="$4"
            mkdir -p "$(dirname "$FILE")"
            printf '%s' "$CONTENT" > "$FILE"
            git add -A
            GIT_AUTHOR_DATE="$DATE" GIT_COMMITTER_DATE="$DATE" \
              git commit -m "$MSG"
          }

          # ── JAN 2026 ──────────────────────────────────────────

          make_commit "2026-01-01T09:14:22" "Initial commit: project scaffold and README" \
            "README.md" \
            "# TaskFlow App
          A full-stack task management web application built with React + Node.js.

          ## Features
          - User authentication
          - Task CRUD operations
          - Team collaboration
          - Real-time updates"

          make_commit "2026-01-02T10:30:05" "Add .gitignore for Node and React projects" \
            ".gitignore" \
            "node_modules/
          .env
          dist/
          *.log
          .DS_Store"

