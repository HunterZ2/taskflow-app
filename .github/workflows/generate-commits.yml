            "src/components/LazyImage.js" \
            "import React, { useState, useRef, useEffect } from 'react';
          export default function LazyImage({ src, alt, className }) {
            var loaded = useState(false);
            var inView = useState(false);
            var setLoaded = loaded[1];
            var setInView = inView[1];
            loaded = loaded[0];
            inView = inView[0];
            var ref = useRef();
            useEffect(function() {
              var obs = new IntersectionObserver(function(entries) {
                if (entries[0].isIntersecting) setInView(true);
              }, { rootMargin: '200px' });
              if (ref.current) obs.observe(ref.current);
              return function() { obs.disconnect(); };
            }, []);
            return (
              <div ref={ref} className={className} style={{minHeight:'80px',background:'#1e293b'}}>
                {inView && <img src={src} alt={alt || ''} onLoad={function() { setLoaded(true); }}
                  style={{opacity: loaded ? 1 : 0, transition:'opacity 0.3s'}} />}
              </div>
            );
          }"

