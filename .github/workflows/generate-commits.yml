          make_commit "2026-03-22T12:40:09" "feat: add InfiniteScroll with IntersectionObserver" \
            "src/components/InfiniteScroll.js" \
            "import React, { useEffect, useRef } from 'react';
          export default function InfiniteScroll({ onLoadMore, hasMore, loading, children }) {
            const sentinel = useRef(null);
            useEffect(() => {
              if (!hasMore) return;
              const observer = new IntersectionObserver(
                ([entry]) => { if (entry.isIntersecting && !loading) onLoadMore(); },
                { threshold: 0.5 }
              );
              if (sentinel.current) observer.observe(sentinel.current);
              return () => observer.disconnect();
            }, [hasMore, loading, onLoadMore]);
            return (
              <div>
                {children}
                {hasMore && <div ref={sentinel} style={{height:'20px'}}>{loading ? 'Loading...' : ''}</div>}
              </div>
            );
          }"

