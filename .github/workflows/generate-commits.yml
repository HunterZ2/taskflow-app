          make_commit "2026-03-30T15:40:08" "feat: create useKeyboardShortcut hook for global hotkeys" \
            "src/hooks/useKeyboardShortcut.js" \
            "import { useEffect } from 'react';
          export function useKeyboardShortcut(keyMap) {
            useEffect(() => {
              const handler = (e) => {
                if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
                const parts = [];
                if (e.ctrlKey) parts.push('ctrl');
                if (e.metaKey) parts.push('meta');
                parts.push(e.key.toLowerCase());
                const combo = parts.join('+');
                if (keyMap[combo]) { e.preventDefault(); keyMap[combo](); }
              };
              window.addEventListener('keydown', handler);
              return () => window.removeEventListener('keydown', handler);
            }, [keyMap]);
          }"

