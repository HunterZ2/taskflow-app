            const res = await fetch('/api' + endpoint, {
              method,
              headers: {
                'Content-Type': 'application/json',
                ...(token && { Authorization: 'Bearer ' + token })
              },
              ...(body && { body: JSON.stringify(body) })
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'API Error');
            return data;
