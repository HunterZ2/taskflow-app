          make_commit "2026-03-18T14:50:24" "feat: create useWebSocket hook for real-time updates" \
            "src/hooks/useWebSocket.js" \
            "import { useEffect, useRef, useState } from 'react';
          export function useWebSocket(url) {
            const ws = useRef(null);
            const [status, setStatus] = useState('connecting');
            const [lastMessage, setLastMessage] = useState(null);
            useEffect(() => {
              ws.current = new WebSocket(url);
              ws.current.onopen = () => setStatus('connected');
              ws.current.onclose = () => setStatus('disconnected');
              ws.current.onmessage = (e) => {
                try { setLastMessage(JSON.parse(e.data)); } catch { setLastMessage(e.data); }
              };
              return () => { if (ws.current) ws.current.close(); };
            }, [url]);
            return { status, lastMessage };
          }"

          make_commit "2026-03-19T10:15:41" "feat: implement WebSocket server for real-time task events" \
            "server/websocket.js" \
            "const WebSocket = require('ws');
          const clients = new Map();
          function setupWebSocket(server) {
            const wss = new WebSocket.Server({ server });
            wss.on('connection', (ws) => {
              const id = Date.now().toString();
              clients.set(id, ws);
              ws.send(JSON.stringify({ type: 'connected' }));
              ws.on('close', () => clients.delete(id));
            });
            return wss;
          }
          function broadcast(event) {
            clients.forEach((ws) => {
              if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(event));
            });
          }
          module.exports = { setupWebSocket, broadcast };"

